<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anokoro Cards - カード一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .game-viewport {
            aspect-ratio: 1920 / 1080;
            width: 100vw;
            max-height: 100vh;
            max-width: calc(100vh * 1920 / 1080);
            position: relative;
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .decor-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 150px;
            height: 100%;
            background-color: #84cc16;
            clip-path: polygon(0 0, 100% 0, 0 40%);
            z-index: 10;
        }

        .decor-right {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 150px;
            height: 100%;
            background-color: #84cc16;
            clip-path: polygon(100% 60%, 100% 100%, 0 100%);
            z-index: 10;
        }

        .header-area {
            height: 120px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            z-index: 20;
        }

        .title-text {
            font-size: 36px;
            font-weight: 700;
            color: #1f2937;
            letter-spacing: 0.1em;
        }

        .btn-close {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 4px solid #f97316;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-close::before, .btn-close::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 6px;
            background-color: #f97316;
            border-radius: 3px;
        }
        .btn-close::before { transform: rotate(45deg); }
        .btn-close::after { transform: rotate(-45deg); }
        .btn-close:hover {
            transform: scale(1.05);
        }

        .btn-search {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1d4ed8;
            font-weight: 700;
            font-size: 16px;
        }
        .btn-search-icon {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 4px solid #1d4ed8;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-search:hover {
            transform: scale(1.05);
        }

        .cards-scroll-container {
            flex-grow: 1;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            align-items: center;
            padding: 0 60px;
            margin: 20px 0;
            cursor: grab;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .cards-scroll-container:active {
            cursor: grabbing;
        }
        .cards-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .cards-grid-2rows {
            display: grid;
            grid-template-rows: repeat(2, 320px);
            grid-auto-flow: column;
            grid-auto-columns: max-content; /* 列幅をカードの実寸幅に自動で合わせる (重なり防止) */
            gap: 30px 24px;
        }

        .card-wrapper {
            height: 320px;
            aspect-ratio: 477 / 665;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
            position: relative;
            flex-shrink: 0; /* 縮み防止 */
            width: auto;
        }
        .card-wrapper:hover {
            transform: translateY(-4px);
            border-color: #84cc16;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #fafafa;
        }

        .footer-area {
            height: 120px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .scrollbar-track {
            width: 1200px;
            height: 16px;
            background-color: #e5e7eb;
            border-radius: 8px;
            position: relative;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .scrollbar-thumb {
            height: 100%;
            background-color: #f97316;
            border-radius: 8px;
            position: absolute;
            left: 0;
            top: 0;
            width: 200px;
            cursor: grab;
        }
        .scrollbar-thumb:active {
            cursor: grabbing;
            background-color: #ea580c;
        }

        .status-text {
            font-size: 20px;
            font-weight: 700;
            color: #4b5563;
            font-style: italic;
        }

        .search-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="game-viewport">
        <div class="decor-left"></div>
        <div class="decor-right"></div>

        <div class="header-area">
            <button class="btn-close" onclick="closeApp()"></button>
            <div class="title-text">カード一覧</div>
            <div class="btn-search" onclick="openSearch()">
                <div class="btn-search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="#1d4ed8" class="w-8 h-8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.637 10.637Z" />
                    </svg>
                </div>
                <span>検索</span>
            </div>
        </div>

        <div class="cards-scroll-container" id="scroll-container">
            <div class="cards-grid-2rows" id="cards-grid">
                <!-- JSで展開 -->
            </div>
        </div>

        <div class="footer-area">
            <div class="scrollbar-track" id="scrollbar-track">
                <div class="scrollbar-thumb" id="scroll-thumb"></div>
            </div>
            <div class="status-text" id="status-count-text">0種を表示中</div>
        </div>

        <div class="search-overlay" id="search-modal" onclick="closeSearch()">
            <div class="search-box" onclick="event.stopPropagation()">
                <h3 class="font-bold text-xl mb-4 text-slate-800">カード検索</h3>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="カード名、効果、セットを検索..." 
                    class="w-full bg-slate-50 border-2 border-blue-500 rounded-xl px-4 py-3 text-lg focus:outline-none focus:bg-white text-slate-800 mb-4"
                    oninput="filterCards()"
                >
                <div class="flex justify-end gap-3">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition" onclick="closeSearch()">決定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let filteredCards = [...cards];
        const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/Omezi42/AnokoroImageFolder/main/images/captured_cards';

        const scrollContainer = document.getElementById('scroll-container');
        const cardsGrid = document.getElementById('cards-grid');
        const scrollbarTrack = document.getElementById('scrollbar-track');
        const scrollThumb = document.getElementById('scroll-thumb');
        const statusText = document.getElementById('status-count-text');
        const searchModal = document.getElementById('search-modal');
        const searchInput = document.getElementById('search-input');

        function init() {
            renderCards();
            setupDragScroll();
            setupScrollbarClickAndDrag();

            // 保存されたスクロール位置を復元する
            const savedPos = sessionStorage.getItem('listScrollLeft');
            if (savedPos) {
                scrollContainer.scrollLeft = parseFloat(savedPos);
                setTimeout(updateScrollIndicator, 150); // レイアウト確定後にインジケータを合わせる
            }
        }

        function renderCards() {
            cardsGrid.innerHTML = '';
            statusText.textContent = `${filteredCards.length}種を表示中`;

            filteredCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-wrapper';
                
                let isDragging = false;
                cardEl.addEventListener('mousedown', () => { isDragging = false; });
                cardEl.addEventListener('mousemove', () => { isDragging = true; });
                cardEl.addEventListener('mouseup', () => {
                    if (!isDragging) {
                        // 詳細画面に遷移する前に、現在のスクロール位置を保存する
                        sessionStorage.setItem('listScrollLeft', scrollContainer.scrollLeft);
                        window.location.href = `./card_viewer.html?id=${card.card_id}`;
                    }
                });

                const img = document.createElement('img');
                img.className = 'card-image';
                const encodedName = encodeURIComponent(card.name);
                img.src = `${GITHUB_RAW_BASE}/${encodedName}.png`;
                img.alt = card.name;
                img.draggable = false;
                img.onerror = () => {
                    img.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350"><rect width="100%" height="100%" fill="%231e1b4b"/><text y="50%" x="50%" fill="%23a5b4fc" font-size="16" text-anchor="middle" font-family="sans-serif">Image not found</text></svg>';
                };

                cardEl.appendChild(img);
                cardsGrid.appendChild(cardEl);
            });

            setTimeout(updateScrollIndicator, 100);
        }

        function setupDragScroll() {
            let isDown = false;
            let startX;
            let scrollLeft;

            scrollContainer.addEventListener('mousedown', (e) => {
                isDown = true;
                startX = e.pageX - scrollContainer.offsetLeft;
                scrollLeft = scrollContainer.scrollLeft;
            });

            scrollContainer.addEventListener('mouseleave', () => {
                isDown = false;
            });

            scrollContainer.addEventListener('mouseup', () => {
                isDown = false;
            });

            scrollContainer.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - scrollContainer.offsetLeft;
                const walk = (x - startX) * 1.5;
                scrollContainer.scrollLeft = scrollLeft - walk;
                
                // スクロール位置を即座にセッションストレージに保存
                sessionStorage.setItem('listScrollLeft', scrollContainer.scrollLeft);
                updateScrollIndicator();
            });

            scrollContainer.addEventListener('scroll', () => {
                sessionStorage.setItem('listScrollLeft', scrollContainer.scrollLeft);
                updateScrollIndicator();
            });
        }

        function updateScrollIndicator() {
            const scrollLeft = scrollContainer.scrollLeft;
            const scrollWidth = scrollContainer.scrollWidth;
            const clientWidth = scrollContainer.clientWidth;

            const maxScroll = scrollWidth - clientWidth;
            const trackWidth = scrollbarTrack.clientWidth;

            if (maxScroll <= 0) {
                scrollThumb.style.width = `${trackWidth}px`;
                scrollThumb.style.left = '0px';
                return;
            }

            const thumbWidth = Math.max(80, (clientWidth / scrollWidth) * trackWidth);
            const maxThumbScroll = trackWidth - thumbWidth;

            const ratio = scrollLeft / maxScroll;
            const thumbLeft = ratio * maxThumbScroll;

            scrollThumb.style.width = `${thumbWidth}px`;
            scrollThumb.style.left = `${thumbLeft}px`;
        }

        function setupScrollbarClickAndDrag() {
            scrollbarTrack.addEventListener('click', (e) => {
                if (e.target === scrollThumb) return;

                const trackRect = scrollbarTrack.getBoundingClientRect();
                const clickX = e.clientX - trackRect.left;
                const trackWidth = scrollbarTrack.clientWidth;
                const thumbWidth = scrollThumb.clientWidth;

                let newThumbLeft = clickX - (thumbWidth / 2);
                newThumbLeft = Math.max(0, Math.min(newThumbLeft, trackWidth - thumbWidth));

                const maxThumbScroll = trackWidth - thumbWidth;
                const ratio = newThumbLeft / maxThumbScroll;

                const maxScroll = scrollContainer.scrollWidth - scrollContainer.clientWidth;
                scrollContainer.scrollLeft = ratio * maxScroll;
                sessionStorage.setItem('listScrollLeft', scrollContainer.scrollLeft);
                updateScrollIndicator();
            });

            let isDraggingThumb = false;
            let startDragX;
            let startThumbLeft;

            scrollThumb.addEventListener('mousedown', (e) => {
                isDraggingThumb = true;
                startDragX = e.clientX;
                startThumbLeft = parseFloat(scrollThumb.style.left) || 0;
                e.stopPropagation();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDraggingThumb) return;

                const deltaX = e.clientX - startDragX;
                const trackWidth = scrollbarTrack.clientWidth;
                const thumbWidth = scrollThumb.clientWidth;
                const maxThumbScroll = trackWidth - thumbWidth;

                let newThumbLeft = startThumbLeft + deltaX;
                newThumbLeft = Math.max(0, Math.min(newThumbLeft, maxThumbScroll));

                const ratio = newThumbLeft / maxThumbScroll;
                const maxScroll = scrollContainer.scrollWidth - scrollContainer.clientWidth;
                
                scrollContainer.scrollLeft = ratio * maxScroll;
                sessionStorage.setItem('listScrollLeft', scrollContainer.scrollLeft);
                updateScrollIndicator();
            });

            document.addEventListener('mouseup', () => {
                isDraggingThumb = false;
            });
        }

        function openSearch() {
            searchModal.style.display = 'flex';
            setTimeout(() => searchInput.focus(), 100);
        }

        function closeSearch() {
            searchModal.style.display = 'none';
        }

        function filterCards() {
            const q = searchInput.value.toLowerCase().trim();
            filteredCards = cards.filter(c => 
                c.name.toLowerCase().includes(q) || 
                (c.effect && c.effect.toLowerCase().includes(q)) ||
                (c.set && c.set.toLowerCase().includes(q))
            );
            renderCards();
        }

        function closeApp() {
            alert("カード一覧を終了します。");
        }

        window.addEventListener('resize', updateScrollIndicator);

        init();
    </script>
