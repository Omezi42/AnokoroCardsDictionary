<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カード文字起こしタイピングゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .correct { background-color: #22c55e !important; }
        .incorrect { background-color: #ef4444 !important; }
        .current-char { 
            background-color: #3b82f6; 
            color: white;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
        .card-image {
            max-height: 300px;
            max-width: 100%;
            object-fit: contain;
        }
        .typing-area {
            font-family: 'Courier New', monospace;
            font-size: 1.25rem;
            line-height: 2;
        }
        .char {
            display: inline-block;
            padding: 0 1px;
            border-radius: 2px;
        }
        .export-area {
            background: #1f2937;
            color: #10b981;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow: auto;
        }
        /* Responsive image sizing */
        @media (min-width: 768px) {
            .card-image {
                max-height: 400px;
            }
        }
        @media (min-width: 1024px) {
            .card-image {
                max-height: 500px;
            }
        }
        /* Image navigation dots */
        .thumb-nav {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .thumb-nav > div {
            scroll-snap-align: center;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <div id="app" class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-600 mb-2">🃏 カード文字起こしタイピングゲーム</h1>
            <p class="text-gray-500 text-sm md:text-base">画像の文字を読んで、OCRの結果を修正してください</p>
        </header>

        <!-- Progress Bar -->
        <div class="mb-4 bg-gray-200 rounded-full h-3 overflow-hidden">
            <div id="progress" class="bg-gradient-to-r from-blue-500 to-purple-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <!-- Stats -->
        <div class="flex flex-wrap justify-center gap-3 md:gap-6 mb-4 text-sm">
            <div class="bg-white shadow rounded-lg px-3 md:px-4 py-2">
                <span class="text-gray-500">進行:</span>
                <span id="current-index" class="text-xl font-bold text-blue-600">0</span>
                <span class="text-gray-400">/</span>
                <span id="total-count" class="text-gray-400">0</span>
            </div>
            <div class="bg-white shadow rounded-lg px-3 md:px-4 py-2">
                <span class="text-gray-500">完了:</span>
                <span id="completed-count" class="text-xl font-bold text-green-600">0</span>
            </div>
            <div class="bg-white shadow rounded-lg px-3 md:px-4 py-2">
                <span class="text-gray-500">フィールド:</span>
                <select id="field-select" class="bg-transparent font-semibold text-purple-600 focus:outline-none">
                    <option value="name">名前</option>
                    <option value="effect">効果</option>
                    <option value="lore">説明</option>
                    <option value="yomi">読み</option>
                    <option value="type">タイプ</option>
                    <option value="power">パワー</option>
                    <option value="cost">コスト</option>
                    <option value="set">セット</option>
                    <option value="tag">タグ</option>
                </select>
            </div>
        </div>

        <!-- Card ID Display -->
        <div class="text-center mb-4">
            <span class="inline-block bg-blue-600 text-white px-6 py-2 rounded-full text-lg md:text-xl font-bold shadow" id="card-id">-</span>
        </div>

        <!-- Main Game Area -->
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Image Section - Left/Top -->
            <div class="lg:w-1/2">
                <div class="bg-white rounded-xl shadow-lg p-4 md:p-6">
                    <h2 class="text-lg font-semibold text-gray-600 mb-4 flex items-center gap-2">
                        <span>📷</span> カード画像
                    </h2>
                    
                    <!-- Main Image Display -->
                    <div class="relative bg-gray-100 rounded-xl overflow-hidden mb-4 flex items-center justify-center min-h-[300px] md:min-h-[400px]">
                        <img 
                            id="main-image"
                            src="" 
                            alt="選択中の画像"
                            class="card-image"
                            onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2260%22 x=%2250%22 text-anchor=%22middle%22 font-size=%2260%22>📷</text></svg>'"
                        >
                        
                        <!-- Image Navigation Arrows -->
                        <button onclick="prevImage()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white rounded-full p-2 md:p-3 shadow-lg transition z-10">
                            <span class="text-xl md:text-2xl">◀</span>
                        </button>
                        <button onclick="nextImage()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white rounded-full p-2 md:p-3 shadow-lg transition z-10">
                            <span class="text-xl md:text-2xl">▶</span>
                        </button>
                    </div>
                    
                    <!-- Image Info -->
                    <div class="text-center mb-4">
                        <span id="image-label" class="inline-block bg-gray-100 text-gray-600 px-4 py-1 rounded-full text-sm font-medium">-</span>
                    </div>
                    
                    <!-- Thumbnail Navigation -->
                    <div class="flex gap-2 overflow-x-auto pb-2 thumb-nav">
                        <!-- Thumbnails will be inserted here -->
                    </div>
                </div>
            </div>

            <!-- Typing Section - Right/Bottom -->
            <div class="lg:w-1/2">
                <div class="bg-white rounded-xl shadow-lg p-4 md:p-6">
                    <h2 class="text-lg font-semibold text-gray-600 mb-4 flex items-center gap-2">
                        <span>⌨️</span> 正しいテキストを入力
                    </h2>
                    
                    <!-- OCR Reference -->
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-sm font-semibold text-blue-600">📝 現在のOCR結果:</h3>
                            <button onclick="copyOcrText()" class="text-xs bg-blue-100 hover:bg-blue-200 text-blue-600 px-3 py-1 rounded transition">コピー</button>
                        </div>
                        <p id="ocr-text" class="text-gray-600 text-sm md:text-base"></p>
                    </div>
                    
                    <!-- Typing Input -->
                    <textarea 
                        id="typed-text" 
                        class="w-full bg-gray-50 border-2 border-gray-300 rounded-xl p-4 text-base md:text-lg h-32 md:h-40 resize-none focus:border-blue-500 focus:outline-none focus:bg-white transition"
                        placeholder="画像を見ながら正しいテキストを入力してください..."
                        oninput="checkTyping()"
                    ></textarea>
                    
                    <!-- Character by Character Display -->
                    <div id="char-display" class="typing-area mt-4 p-3 md:p-4 bg-gray-50 rounded-lg min-h-[60px] break-all text-sm md:text-base"></div>
                    
                    <!-- Match Result -->
                    <div id="match-result" class="mt-4 text-center text-lg md:text-xl font-bold"></div>
                    
                    <!-- Action Buttons -->
                    <div class="flex flex-col sm:flex-row gap-3 mt-6">
                        <button onclick="saveAndNext()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition shadow-lg hover:shadow-xl">
                            ✓ 保存して次へ
                        </button>
                        <button onclick="markCorrect()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition shadow-lg hover:shadow-xl">
                            ✓ OCRのまま
                        </button>
                    </div>
                    <button onclick="skip()" class="w-full mt-3 bg-gray-200 hover:bg-gray-300 text-gray-600 font-semibold py-2 rounded-xl transition">
                        ⏭ スキップ（次のフィールド）
                    </button>
                </div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mt-6">
            <div class="flex flex-wrap gap-3 md:gap-4 items-center justify-center">
                <button onclick="prevCard()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 md:px-6 rounded-lg transition">◀ 前のカード</button>
                <button onclick="nextCard()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 md:px-6 rounded-lg transition">次のカード ▶</button>
                <button onclick="shuffleCards()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 md:px-6 rounded-lg transition">🔀 シャッフル</button>
                
                <div class="flex gap-2 items-center">
                    <input type="number" id="goto-id" class="bg-gray-100 w-20 px-3 py-2 rounded-lg text-center" placeholder="ID">
                    <button onclick="goToCard()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">移動</button>
                </div>
            </div>
        </div>

        <!-- Export/Import Panel -->
        <div class="bg-white rounded-xl shadow-lg p-4 md:p-6 mt-4">
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="exportJson()" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-6 rounded-lg transition">📥 JSONエクスポート</button>
                <button onclick="exportCsv()" class="bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2 px-6 rounded-lg transition">📥 CSVエクスポート</button>
                <button onclick="importJson()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold py-2 px-6 rounded-lg transition">📤 JSONインポート</button>
                <button onclick="resetProgress()" class="bg-red-100 hover:bg-red-200 text-red-600 font-semibold py-2 px-6 rounded-lg transition">🗑️ 進捗リセット</button>
            </div>
        </div>

        <!-- Export Preview Modal -->
        <div id="export-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
            <div class="bg-white rounded-2xl p-6 max-w-4xl w-full max-h-[90vh] flex flex-col shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-800">📋 エクスポートプレビュー</h3>
                    <div class="flex gap-2">
                        <button onclick="copyExport()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition">📋 コピー</button>
                        <button onclick="closeExportModal()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg transition">✕ 閉じる</button>
                    </div>
                </div>
                <textarea id="export-content" class="export-area flex-1 rounded-xl p-4" readonly></textarea>
            </div>
        </div>

        <!-- Import Modal -->
        <div id="import-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
            <div class="bg-white rounded-2xl p-6 max-w-2xl w-full shadow-2xl">
                <h3 class="text-xl font-bold text-gray-800 mb-4">📤 JSONインポート</h3>
                <p class="text-gray-500 text-sm mb-4">保存したJSONファイルを貼り付けてください：</p>
                <textarea id="import-content" class="w-full h-48 bg-gray-50 border border-gray-300 rounded-xl p-3 font-mono text-sm"></textarea>
                <div class="flex gap-3 mt-4">
                    <button onclick="confirmImport()" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold transition">インポート</button>
                    <button onclick="closeImportModal()" class="bg-gray-200 hover:bg-gray-300 py-3 px-6 rounded-xl transition">キャンセル</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-gray-400 text-sm mt-8">
            <p>進捗はブラウザに自動保存されます</p>
        </footer>
    </div>

    <script>
        // ============ State ============
        let cards = [];
        let currentIndex = 0;
        let currentImageIndex = 0;
        let progress = { completed: new Set(), corrections: {} };
        let currentField = 'name';
        const IMAGE_BASE = './card_images';
        const TOTAL_FIELDS = ['name', 'effect', 'lore', 'yomi', 'type', 'power', 'cost', 'set', 'tag'];
        const FIELD_LABELS = {
            name: 'カード名',
            effect: '効果',
            lore: '説明文',
            yomi: '読み',
            type: 'タイプ',
            power: 'パワー',
            cost: 'コスト',
            set: 'セット',
            tag: 'タグ'
        };

        // ============ Initialize ============
        async function init() {
            try {
                const response = await fetch('./card_database.json');
                const data = await response.json();
                cards = data.cards || data;
                
                // Load saved progress
                loadProgress();
                
                document.getElementById('total-count').textContent = cards.length;
                updateDisplay();
                
                // Event listeners
                document.getElementById('field-select').addEventListener('change', (e) => {
                    currentField = e.target.value;
                    currentImageIndex = TOTAL_FIELDS.indexOf(currentField);
                    updateDisplay();
                });
                
                // Keyboard shortcuts
                document.addEventListener('keydown', handleKeyboard);
                
            } catch (error) {
                console.error('Failed to load card_database.json:', error);
                document.getElementById('app').innerHTML = `
                    <div class="text-center py-20">
                        <h2 class="text-2xl font-bold text-red-500 mb-4">エラー</h2>
                        <p class="text-gray-500">card_database.json の読み込みに失敗しました。</p>
                        <p class="text-gray-400 text-sm mt-2">リポジトリのルートに card_database.json があることを確認してください。</p>
                    </div>
                `;
            }
        }

        // ============ Display ============
        function updateDisplay() {
            if (cards.length === 0) return;
            
            const card = cards[currentIndex];
            
            // Update card ID
            document.getElementById('card-id').textContent = `ID: ${card.card_id}`;
            
            // Update main image
            const field = TOTAL_FIELDS[currentImageIndex];
            document.getElementById('main-image').src = `${IMAGE_BASE}/${field}/${card.card_id}.png`;
            document.getElementById('image-label').textContent = FIELD_LABELS[field];
            
            // Generate thumbnails
            const thumbContainer = document.querySelector('.thumb-nav');
            thumbContainer.innerHTML = TOTAL_FIELDS.map((f, i) => `
                <button 
                    onclick="selectImage(${i})" 
                    class="flex-shrink-0 w-16 h-16 md:w-20 md:h-20 rounded-lg overflow-hidden border-2 transition ${i === currentImageIndex ? 'border-blue-500 ring-2 ring-blue-200' : 'border-gray-200 hover:border-gray-300'}"
                >
                    <img 
                        src="${IMAGE_BASE}/${f}/${card.card_id}.png" 
                        alt="${FIELD_LABELS[f]}"
                        class="w-full h-full object-cover"
                        onerror="this.style.display='none'"
                    >
                    <span class="block text-xs text-center py-1 bg-gray-100">${FIELD_LABELS[f]}</span>
                </button>
            `).join('');
            
            // Update OCR text (show only selected field)
            const ocrValue = card[currentField] || '';
            document.getElementById('ocr-text').textContent = ocrValue || '(空)';
            
            // Load previously typed text if exists
            const savedText = progress.corrections[`${card.card_id}_${currentField}`];
            document.getElementById('typed-text').value = savedText || ocrValue;
            
            // Update stats
            document.getElementById('current-index').textContent = currentIndex + 1;
            document.getElementById('completed-count').textContent = progress.completed.size;
            
            // Update progress bar
            const pct = ((currentIndex + 1) / cards.length) * 100;
            document.getElementById('progress').style.width = pct + '%';
            
            updateCharDisplay();
            updateMatchResult();
            
            // Focus input
            setTimeout(() => document.getElementById('typed-text').focus(), 100);
        }

        function updateCharDisplay() {
            const ocr = cards[currentIndex][currentField] || '';
            const typed = document.getElementById('typed-text').value;
            const display = document.getElementById('char-display');
            
            if (!ocr) {
                display.innerHTML = '<span class="text-gray-400 text-sm">このフィールドは空です</span>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < ocr.length; i++) {
                let cls = 'char text-gray-600';
                if (i < typed.length) {
                    cls = typed[i] === ocr[i] ? 'char text-green-500 bg-green-100' : 'char text-red-500 bg-red-100';
                } else if (i === typed.length) {
                    cls = 'char current-char';
                }
                const char = ocr[i] === ' ' ? '&nbsp;' : escHtml(ocr[i]);
                html += `<span class="${cls}">${char}</span>`;
            }
            display.innerHTML = html;
        }

        function updateMatchResult() {
            const ocr = cards[currentIndex][currentField] || '';
            const typed = document.getElementById('typed-text').value;
            const result = document.getElementById('match-result');
            
            if (typed.length === 0) {
                result.textContent = '';
                result.className = 'mt-4 text-center text-lg md:text-xl font-bold';
            } else if (typed === ocr) {
                result.textContent = '✅ 完全一致！';
                result.className = 'mt-4 text-center text-lg md:text-xl font-bold text-green-500';
            } else if (ocr.startsWith(typed) || typed.startsWith(ocr)) {
                const ocrChars = [...ocr];
                const typedChars = [...typed];
                const matchLen = typedChars.filter((c, i) => c === ocrChars[i]).length;
                const pct = Math.round((matchLen / Math.max(ocr.length, typed.length)) * 100);
                result.textContent = `🔄 ${pct}% 一致`;
                result.className = 'mt-4 text-center text-lg md:text-xl font-bold text-yellow-500';
            } else {
                result.textContent = '❌ 不一致';
                result.className = 'mt-4 text-center text-lg md:text-xl font-bold text-red-500';
            }
        }

        function checkTyping() {
            updateCharDisplay();
            updateMatchResult();
            saveProgress();
        }

        // ============ Image Navigation ============
        function selectImage(index) {
            currentImageIndex = index;
            updateDisplay();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + TOTAL_FIELDS.length) % TOTAL_FIELDS.length;
            updateDisplay();
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % TOTAL_FIELDS.length;
            updateDisplay();
        }

        // ============ Navigation ============
        function saveAndNext() {
            const card = cards[currentIndex];
            const key = `${card.card_id}_${currentField}`;
            const typed = document.getElementById('typed-text').value;
            
            // Save correction
            progress.corrections[key] = typed;
            progress.completed.add(key);
            
            saveProgress();
            
            // Auto advance to next unfinished field
            const nextFieldIndex = TOTAL_FIELDS.indexOf(currentField) + 1;
            if (nextFieldIndex < TOTAL_FIELDS.length) {
                // Switch to next field within same card
                currentField = TOTAL_FIELDS[nextFieldIndex];
                document.getElementById('field-select').value = currentField;
                currentImageIndex = nextFieldIndex;
                updateDisplay();
            } else {
                // Move to next card
                nextCard();
            }
        }

        function skip() {
            const nextFieldIndex = TOTAL_FIELDS.indexOf(currentField) + 1;
            if (nextFieldIndex < TOTAL_FIELDS.length) {
                currentField = TOTAL_FIELDS[nextFieldIndex];
                document.getElementById('field-select').value = currentField;
                currentImageIndex = nextFieldIndex;
            } else {
                nextCard();
            }
            updateDisplay();
        }

        function markCorrect() {
            const ocr = cards[currentIndex][currentField] || '';
            document.getElementById('typed-text').value = ocr;
            saveAndNext();
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                currentImageIndex = 0;
                currentField = TOTAL_FIELDS[0];
                document.getElementById('field-select').value = currentField;
                updateDisplay();
            }
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                currentImageIndex = 0;
                currentField = TOTAL_FIELDS[0];
                document.getElementById('field-select').value = currentField;
                updateDisplay();
            }
        }

        function goToCard() {
            const id = parseInt(document.getElementById('goto-id').value);
            const idx = cards.findIndex(c => c.card_id === id);
            if (idx >= 0) {
                currentIndex = idx;
                currentImageIndex = 0;
                currentField = TOTAL_FIELDS[0];
                document.getElementById('field-select').value = currentField;
                updateDisplay();
            } else {
                alert('指定されたIDのカードが見つかりません');
            }
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            currentImageIndex = 0;
            currentField = TOTAL_FIELDS[0];
            document.getElementById('field-select').value = currentField;
            updateDisplay();
        }

        // ============ Export/Import ============
        function exportJson() {
            const corrected = cards.map(card => {
                const corrected = { ...card };
                TOTAL_FIELDS.forEach(field => {
                    const key = `${card.card_id}_${field}`;
                    if (progress.corrections[key] !== undefined) {
                        corrected[field] = progress.corrections[key];
                    }
                });
                return corrected;
            });
            
            const json = JSON.stringify({ cards: corrected }, null, 2);
            document.getElementById('export-content').value = json;
            document.getElementById('export-modal').classList.remove('hidden');
            document.getElementById('export-modal').classList.add('flex');
        }

        function exportCsv() {
            const corrected = cards.map(card => {
                const row = {};
                TOTAL_FIELDS.forEach(field => {
                    const key = `${card.card_id}_${field}`;
                    row[field] = progress.corrections[key] !== undefined 
                        ? progress.corrections[key] 
                        : (card[field] || '');
                });
                return row;
            });
            
            const headers = ['card_id', ...TOTAL_FIELDS].join(',');
            const rows = corrected.map(card => {
                return TOTAL_FIELDS.map(f => {
                    let val = card[f] || '';
                    if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                        val = '"' + val.replace(/"/g, '""') + '"';
                    }
                    return val;
                }).join(',');
            });
            
            const csv = [headers, ...rows].join('\n');
            document.getElementById('export-content').value = csv;
            document.getElementById('export-modal').classList.remove('hidden');
            document.getElementById('export-modal').classList.add('flex');
        }

        function importJson() {
            document.getElementById('import-modal').classList.remove('hidden');
            document.getElementById('import-modal').classList.add('flex');
            document.getElementById('import-content').value = '';
        }

        function confirmImport() {
            try {
                const data = JSON.parse(document.getElementById('import-content').value);
                const importedCards = data.cards || data;
                
                progress.corrections = {};
                progress.completed = new Set();
                
                importedCards.forEach(card => {
                    TOTAL_FIELDS.forEach(field => {
                        if (card[field] !== undefined) {
                            const originalCard = cards.find(c => c.card_id === card.card_id);
                            if (originalCard && card[field] !== originalCard[field]) {
                                const key = `${card.card_id}_${field}`;
                                progress.corrections[key] = card[field];
                                progress.completed.add(key);
                            }
                        }
                    });
                });
                
                saveProgress();
                closeImportModal();
                updateDisplay();
                alert('インポートが完了しました！');
            } catch (e) {
                alert('JSONの解析に失敗しました: ' + e.message);
            }
        }

        function closeExportModal() {
            document.getElementById('export-modal').classList.add('hidden');
            document.getElementById('export-modal').classList.remove('flex');
        }

        function closeImportModal() {
            document.getElementById('import-modal').classList.add('hidden');
            document.getElementById('import-modal').classList.remove('flex');
        }

        function copyExport() {
            const content = document.getElementById('export-content');
            content.select();
            document.execCommand('copy');
            alert('クリップボードにコピーしました！');
        }

        function copyOcrText() {
            const text = document.getElementById('ocr-text').textContent;
            navigator.clipboard.writeText(text);
            alert('コピーしました！');
        }

        function resetProgress() {
            if (confirm('本当に進捗をリセットしますか？修正データは失われます。')) {
                progress = { completed: new Set(), corrections: {} };
                localStorage.removeItem('typingGameProgress');
                updateDisplay();
                alert('進捗をリセットしました');
            }
        }

        // ============ Persistence ============
        function saveProgress() {
            const data = {
                corrections: progress.corrections,
                completed: [...progress.completed],
                currentIndex: currentIndex,
                currentField: currentField
            };
            localStorage.setItem('typingGameProgress', JSON.stringify(data));
        }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('typingGameProgress');
                if (saved) {
                    const data = JSON.parse(saved);
                    progress.corrections = data.corrections || {};
                    progress.completed = new Set(data.completed || []);
                    if (data.currentIndex !== undefined) currentIndex = data.currentIndex;
                    if (data.currentField) {
                        currentField = data.currentField;
                        currentImageIndex = TOTAL_FIELDS.indexOf(currentField);
                    }
                }
            } catch (e) {
                console.log('Failed to load progress');
            }
        }

        // ============ Keyboard Shortcuts ============
        function handleKeyboard(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    prevCard();
                    break;
                case 'ArrowRight':
                    nextCard();
                    break;
                case 'ArrowUp':
                    prevImage();
                    break;
                case 'ArrowDown':
                    nextImage();
                    break;
                case 'Enter':
                case ' ':
                    document.getElementById('typed-text').focus();
                    break;
            }
        }

        // ============ Utilities ============
        function escHtml(str) {
            return str.replace(/&/g, '&amp;')
                     .replace(/</g, '&lt;')
                     .replace(/>/g, '&gt;')
                     .replace(/"/g, '&quot;');
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
